<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Devis Rapide Domotique</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .card { background: white; padding: 20px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #1e293b; margin-top: 0; font-size: 1.4rem; }
        .product-preview { width: 100%; height: 280px; background: white; border-radius: 20px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid #f1f5f9; }
        .product-preview img { width: 100%; height: 100%; object-fit: contain; }
        label { display: block; margin: 12px 0 5px; font-weight: 600; color: #334155; font-size: 0.9rem; }
        select { width: 100%; padding: 14px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 1rem; background-color: #fff; cursor: pointer; -webkit-appearance: none; }
        .result-box { margin-top: 20px; padding: 20px; background: #f0f7ff; border-radius: 20px; text-align: center; border: 2px dashed #3b82f6; }
        .price-label { font-size: 0.8rem; color: #3b82f6; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .price-value { font-size: 2.5rem; font-weight: 800; color: #1e3a8a; margin: 5px 0; }
        .gain { color: #059669; font-weight: 700; font-size: 1rem; background: #dcfce7; display: inline-block; padding: 2px 10px; border-radius: 10px; }
        .specs { margin-top: 20px; font-size: 0.9rem; color: #475569; background: #fff5f7; padding: 15px; border-radius: 15px; border-left: 5px solid #db2777; }
        .specs b { color: #be185d; display: block; margin-bottom: 8px; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px; }
    </style>
</head>
<body>
<div class="card">
    <h2>🏠 Devis Express</h2>
    <div class="product-preview">
        <img id="product-img" src="tactile-blanc.jpg" alt="Produit">
    </div>
    <label>Type d'équipement :</label>
    <select id="modele" onchange="updateUI()">
        <option value="tactile">Tactile (Lumière)</option>
        <option value="volet">Volets (3 boutons)</option>
    </select>
    <label>Finition :</label>
    <select id="couleur" onchange="updateUI()">
        <option value="blanc">Blanc Pur</option>
        <option value="noir">Noir Mat</option>
    </select>
    <label>Nombre de postes :</label>
    <select id="quantite" onchange="updateUI()">
        <option value="1">1 unité</option>
        <option value="2">2 unités (Pack Duo)</option>
        <option value="3">3 unités</option>
        <option value="4">4 unités</option>
        <option value="5">5 unités (Pack Maison)</option>
        <option value="10">10 unités (Pack Total)</option>
    </select>
    <div class="specs">
        <b>🤖 Services Inclus :</b>
        🌴 <b>Mode Vacances :</b> Simulation de présence.<br>
        🌙 <b>Scénario Nuit :</b> Fermeture centralisée.<br>
        ⏰ <b>Automatisations :</b> Plannings horaires.
    </div>
    <div class="result-box">
        <div class="price-label">Prix Clé en main</div>
        <div id="total-v" class="price-value">45,00€</div>
        <div id="gain-v" class="gain">Gain : 26,10€</div>
    </div>
</div>
<script>
    function updateUI() {
        const mod = document.getElementById('modele').value;
        const col = document.getElementById('couleur').value;
        const qty = parseInt(document.getElementById('quantite').value);
        const img = document.getElementById('product-img');
        
        // Mise à jour de l'image (le nom doit correspondre au fichier sur GitHub)
        img.src = mod + '-' + col + '.jpg';

        const achatU = 18.90;
        let venteU = 45;
        if (qty >= 5) venteU = 36;
        else if (qty >= 2) venteU = 40;

        const totalVente = qty * venteU;
        const totalGain = totalVente - (qty * achatU);

        document.getElementById('total-v').innerText = totalVente.toFixed(2).replace('.', ',') + "€";
        document.getElementById('gain-v').innerText = "Gain : " + totalGain.toFixed(2).replace('.', ',') + "€";
    }
    window.onload = updateUI;
</script>
</body>
</html>
