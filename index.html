<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculateur Domotique</title>
    <style>
        :root { --primary: #1e3a8a; --accent: #db2777; --bg: #f1f5f9; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        
        /* Switch Mode Ami/Pro */
        .mode-selector { margin-bottom: 15px; background: #e2e8f0; padding: 5px; border-radius: 50px; display: flex; width: 200px; cursor: pointer; }
        .mode-btn { flex: 1; text-align: center; padding: 8px; border-radius: 40px; font-size: 0.8rem; font-weight: bold; transition: 0.3s; }
        .active-mode { background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); color: var(--primary); }

        .card { background: white; padding: 25px; border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); width: 100%; max-width: 400px; border: 1px solid #e2e8f0; box-sizing: border-box; }
        h2 { text-align: center; color: var(--primary); margin-top: 0; font-size: 1.4rem; }
        
        .product-preview { width: 100%; height: 250px; background: #fff; border-radius: 20px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid #f1f5f9; }
        .product-preview img { width: 100%; height: 100%; object-fit: contain; }

        label { display: block; margin: 12px 0 5px; font-weight: 700; color: #475569; font-size: 0.8rem; text-transform: uppercase; }
        select { width: 100%; padding: 12px; border: 2px solid #f1f5f9; border-radius: 12px; font-size: 1rem; background-color: #f8fafc; color: #1e293b; outline: none; margin-bottom: 5px; }
        
        .specs { margin-top: 20px; font-size: 0.85rem; color: #334155; background: #fff1f2; padding: 12px; border-radius: 15px; border-left: 5px solid var(--accent); }
        .specs b { color: var(--accent); display: block; margin-bottom: 5px; text-transform: uppercase; font-size: 0.7rem; }

        .result-box { margin-top: 25px; padding: 20px; background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%); border-radius: 20px; text-align: center; color: white; }
        .price-label { font-size: 0.8rem; opacity: 0.9; text-transform: uppercase; font-weight: 600; }
        .price-value { font-size: 2.5rem; font-weight: 800; margin: 5px 0; }
        .gain { margin-top: 10px; color: #4ade80; font-weight: 700; font-size: 0.9rem; background: rgba(255,255,255,0.1); display: inline-block; padding: 4px 12px; border-radius: 20px; }
    </style>
</head>
<body>

<!-- Sélecteur de Mode -->
<div class="mode-selector" onclick="toggleMode()">
    <div id="mode-ami" class="mode-btn active-mode">Mode Ami</div>
    <div id="mode-pro" class="mode-btn">Mode Pro</div>
</div>

<div class="card">
    <h2 id="title">🏠 Offre Ami</h2>

    <div class="product-preview">
        <img id="product-img" src="tactile-blanc.jpg" alt="Produit">
    </div>

    <label>Équipement</label>
    <select id="modele" onchange="updateUI()">
        <option value="tactile">Lumière Tactile</option>
        <option value="volet">Volets Roulants</option>
    </select>

    <label>Finition</label>
    <select id="couleur" onchange="updateUI()">
        <option value="blanc">Blanc Pur</option>
        <option value="noir">Noir Mat</option>
    </select>

    <label>Quantité</label>
    <select id="quantite" onchange="updateUI()">
        <option value="1">1 poste</option>
        <option value="2">2 postes (Pack Duo)</option>
        <option value="3">3 postes</option>
        <option value="4">4 postes</option>
        <option value="5">5 postes (Pack Maison)</option>
        <option value="10">10 postes (Total)</option>
    </select>

    <div class="specs">
        <b>🤖 Services Inclus :</b>
        🌴 Simulation de présence (Vacances)<br>
        🌙 Scénario Nuit (Centralisation)<br>
        ⏰ Plannings horaires auto.
    </div>

    <div class="result-box">
        <div class="price-label" id="price-desc">Tarif Préférentiel</div>
        <div id="total-v" class="price-value">45,00€</div>
        <div id="gain-v" class="gain">Gain net : 26,10€</div>
    </div>
</div>

<script>
    let currentMode = 'ami'; // Mode par défaut

    function toggleMode() {
        currentMode = (currentMode === 'ami') ? 'pro' : 'ami';
        
        // Mise à jour visuelle du switch
        document.getElementById('mode-ami').classList.toggle('active-mode');
        document.getElementById('mode-pro').classList.toggle('active-mode');
        
        // Mise à jour du titre et du label
        document.getElementById('title').innerText = (currentMode === 'ami') ? "🏠 Offre Ami" : "💼 Devis Professionnel";
        document.getElementById('price-desc').innerText = (currentMode === 'ami') ? "Tarif Préférentiel" : "Forfait Clé en main";
        
        updateUI();
    }

    function updateUI() {
        const mod = document.getElementById('modele').value;
        const col = document.getElementById('couleur').value;
        const qty = parseInt(document.getElementById('quantite').value);
        const img = document.getElementById('product-img');
        
        // Image
        img.src = mod + '-' + col + '.jpg';

        // Grille tarifaire
        const achatU = 18.90;
        let venteU;

        if (currentMode === 'ami') {
            // Tarifs AMI
            venteU = 45;
            if (qty >= 5) venteU = 36;
            else if (qty >= 2) venteU = 40;
        } else {
            // Tarifs PRO
            venteU = 89;
            if (qty >= 5) venteU = 65;
            else if (qty >= 2) venteU = 75;
        }

        const totalVente = qty * venteU;
        const totalGain = totalVente - (qty * achatU);

        document.getElementById('total-v').innerText = totalVente.toFixed(2).replace('.', ',') + "€";
        document.getElementById('gain-v').innerText = "Gain net : " + totalGain.toFixed(2).replace('.', ',') + "€";
    }

    window.onload = updateUI;
</script>

</body>
</html>
