<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurateur</title>
    <style>
        :root { --primary: #1e3a8a; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .card { background: white; padding: 25px; border-radius: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; border: 1px solid #e2e8f0; }
        h2 { text-align: center; color: #1e293b; margin-top: 0; font-size: 1.3rem; cursor: pointer; user-select: none; }
        .product-preview { width: 100%; height: 250px; background: #fff; border-radius: 20px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .product-preview img { width: 100%; height: 100%; object-fit: contain; }
        label { display: block; margin: 12px 0 5px; font-weight: 600; color: #64748b; font-size: 0.8rem; text-transform: uppercase; }
        select { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 12px; font-size: 1rem; background-color: #fff; color: #1e293b; margin-bottom: 5px; outline: none; -webkit-appearance: none; }
        .specs { margin-top: 20px; font-size: 0.85rem; color: #475569; background: #f8fafc; padding: 12px; border-radius: 15px; border: 1px solid #e2e8f0; }
        .specs b { color: #1e293b; display: block; margin-bottom: 5px; text-transform: uppercase; font-size: 0.7rem; }
        
        .result-box { margin-top: 25px; padding: 20px; background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%); border-radius: 20px; text-align: center; color: white; box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2); cursor: pointer; user-select: none; }
        .price-label { font-size: 0.8rem; opacity: 0.9; font-weight: 600; }
        .price-value { font-size: 2.5rem; font-weight: 800; margin: 5px 0; }
        .discount-badge { font-size: 0.7rem; background: rgba(255,255,255,0.2); padding: 2px 6px; border-radius: 5px; margin-left: 5px; vertical-align: middle; }
        
        .gain-secret { margin-top: 15px; color: #cbd5e1; font-size: 0.65rem; text-align: center; width: 100%; font-family: monospace; }
    </style>
</head>
<body>

<div class="card">
    <!-- Clic ici pour passer en mode AMI discrètement -->
    <h2 id="title" onclick="toggleMode()">🏠 Mon Installation</h2>

    <div class="product-preview">
        <img id="product-img" src="tactile-blanc.jpg" alt="Produit">
    </div>

    <label>Modèle</label>
    <select id="modele" onchange="updateUI()">
        <option value="tactile">Lumière Tactile</option>
        <option value="volet">Volets Roulants</option>
    </select>

    <label>Finition</label>
    <select id="couleur" onchange="updateUI()">
        <option value="blanc">Blanc Pur</option>
        <option value="noir">Noir Mat</option>
    </select>

    <label>Quantité</label>
    <select id="quantite" onchange="updateUI()">
        <option value="1">1 poste</option>
        <option value="2">2 postes (Duo)</option>
        <option value="3">3 postes</option>
        <option value="4">4 postes</option>
        <option value="5">5 postes (Pack Maison)</option>
        <option value="10">10 postes</option>
    </select>

    <div class="specs">
        <b>🤖 Fonctions incluses :</b>
        🌴 Simulation de présence (Vacances)<br>
        🌙 Centralisation (Scénario Nuit)<br>
        ⏰ Automatisations horaires
    </div>

    <!-- Clic ici pour les remises -10%, -20%, -30% -->
    <div class="result-box" onclick="applyDiscount()">
        <div class="price-label">
            <span id="price-desc">Forfait installation</span>
            <span id="discount-val" class="discount-badge" style="display:none;">-0%</span>
        </div>
        <div id="total-v" class="price-value">89,00€</div>
    </div>
    
    <div id="gain-v" class="gain-secret">Ref: 70,10</div>
</div>

<script>
    // INITIALISATION EN MODE PRO (Prix fort)
    let currentMode = 'pro'; 
    let discountLevel = 0; 

    function toggleMode() {
        currentMode = (currentMode === 'pro') ? 'ami' : 'pro';
        discountLevel = 0; 
        
        document.getElementById('price-desc').innerText = (currentMode === 'pro') ? "Forfait installation" : "Tarif préférentiel";
        document.getElementById('discount-val').style.display = 'none';
        updateUI();
    }

    function applyDiscount() {
        // La remise ne fonctionne qu'en mode PRO
        if (currentMode === 'pro') {
            discountLevel += 0.1;
            if (discountLevel > 0.31) discountLevel = 0; 
            
            const badge = document.getElementById('discount-val');
            if (discountLevel > 0) {
                badge.innerText = "-" + Math.round(discountLevel * 100) + "%";
                badge.style.display = 'inline-block';
            } else {
                badge.style.display = 'none';
            }
            updateUI();
        }
    }

    function updateUI() {
        const mod = document.getElementById('modele').value;
        const col = document.getElementById('couleur').value;
        const qty = parseInt(document.getElementById('quantite').value);
        const img = document.getElementById('product-img');
        
        img.src = mod + '-' + col + '.jpg';

        const achatU = 18.90;
        let venteU;

        if (currentMode === 'ami') {
            venteU = 45;
            if (qty >= 5) venteU = 36;
            else if (qty >= 2) venteU = 40;
        } else {
            // Mode PRO (89€)
            venteU = 89;
            if (qty >= 5) venteU = 65;
            else if (qty >= 2) venteU = 75;
            
            // Application de la remise si cliquée
            venteU = venteU * (1 - discountLevel);
        }

        const totalVente = qty * venteU;
        const totalGain = totalVente - (qty * achatU);

        document.getElementById('total-v').innerText = totalVente.toFixed(2).replace('.', ',') + "€";
        document.getElementById('gain-v').innerText = "Ref: " + totalGain.toFixed(2).replace('.', ',');
    }

    // Lancer au démarrage pour afficher le prix PRO immédiatement
    window.onload = updateUI;
</script>

</body>
</html>
