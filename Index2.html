<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Devis Rapide Domotique</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #1e293b; margin-top: 0; }
        
        .product-preview { width: 100%; height: 250px; background: white; border-radius: 15px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid #eee; }
        .product-preview img { width: 100%; height: 100%; object-fit: contain; }

        label { display: block; margin: 12px 0 5px; font-weight: 600; color: #334155; font-size: 0.9rem; }
        select { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 1rem; background-color: white; cursor: pointer; margin-bottom: 5px; }
        
        .result-box { margin-top: 20px; padding: 15px; background: #eff6ff; border-radius: 15px; text-align: center; border: 2px dashed #bfdbfe; }
        .price-label { font-size: 0.8rem; color: #3b82f6; font-weight: bold; text-transform: uppercase; }
        .price-value { font-size: 2.2rem; font-weight: 800; color: #1e3a8a; margin: 5px 0; }
        .gain { color: #059669; font-weight: 600; font-size: 0.95rem; }
        
        .specs { margin-top: 15px; font-size: 0.85rem; color: #475569; background: #fdf2f8; padding: 12px; border-radius: 10px; border-left: 4px solid #db2777; }
        .specs b { color: #be185d; display: block; margin-bottom: 5px; text-transform: uppercase; font-size: 0.75rem; }
    </style>
</head>
<body>

<div class="card">
    <h2>🏠 Offre Connectée</h2>

    <div class="product-preview">
        <img id="product-img" src="https://r.jina.ai/i/6f932ec79b2a41f696660144ec0691e8" alt="Produit">
    </div>

    <label>Modèle :</label>
    <select id="modele" onchange="updateUI()">
        <option value="tactile">Tactile (Lumière)</option>
        <option value="volet">Volets (Physique 3 boutons)</option>
    </select>

    <label>Couleur :</label>
    <select id="couleur" onchange="updateUI()">
        <option value="blanc">Blanc</option>
        <option value="noir">Noir Mat</option>
    </select>

    <label>Quantité :</label>
    <select id="quantite" onchange="updateUI()">
        <option value="1">1 unité</option>
        <option value="2">2 unités (Duo)</option>
        <option value="3">3 unités</option>
        <option value="4">4 unités</option>
        <option value="5">5 unités (Maison)</option>
        <option value="10">10 unités (Total)</option>
    </select>

    <div class="specs">
        <b>🤖 Automatisations incluses :</b>
        🌴 <b>Mode Vacances :</b> Simulation de présence (allumage aléatoire).<br>
        🌙 <b>Scénario Nuit :</b> Tout éteindre/fermer en un clic.<br>
        ⏰ <b>Planning :</b> Ouverture/Fermeture auto selon le soleil.
    </div>

    <div class="result-box">
        <div class="price-label">Prix "Clé en main"</div>
        <div class="price-value" id="total-v">45,00€</div>
        <div class="gain" id="gain-v">Gain net : 26,10€</div>
    </div>
</div>

<script>
    const images = {
        'tactile-blanc': 'https://r.jina.ai/i/6f932ec79b2a41f696660144ec0691e8',
        'tactile-noir': 'https://r.jina.ai/i/068ec5d9961d490b8f0ca438848a4365',
        'volet-blanc': 'https://r.jina.ai/i/38a0f9b4f9974c838e55593f6b43d3cc',
        'volet-noir': 'https://r.jina.ai/i/8525b642676742519198642939981881'
    };

    function updateUI() {
        const mod = document.getElementById('modele').value;
        const col = document.getElementById('couleur').value;
        const qty = parseInt(document.getElementById('quantite').value);
        const img = document.getElementById('product-img');
        
        const key = mod + '-' + col;
        img.src = images[key];

        const achatU = 18.90;
        let venteU = 45;
        if (qty >= 5) venteU = 36;
        else if (qty >= 2) venteU = 40;

        const totalVente = qty * venteU;
        const totalGain = totalVente - (qty * achatU);

        document.getElementById('total-v').innerText = totalVente.toFixed(2).replace('.', ',') + "€";
        document.getElementById('gain-v').innerText = "Gain net : " + totalGain.toFixed(2).replace('.', ',') + "€";
    }
</script>

</body>
</html>
